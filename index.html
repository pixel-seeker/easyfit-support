<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyFit — Fitness Apps</title>
    <meta name="description" content="Support and legal pages for EasyFit fitness apps.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.2rem;
            color: #a3a3a3;
            margin-bottom: 2.5rem;
        }

        .apps {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .app-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: #f5f5f5;
            transition: border-color 0.2s;
        }

        .app-card:hover {
            border-color: #4ade80;
        }

        .app-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .app-card p {
            font-size: 0.9rem;
            color: #a3a3a3;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            margin-bottom: 0.5rem;
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            font-size: 0.85rem;
        }

        .links a {
            color: #737373;
            text-decoration: none;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #f5f5f5;
        }

        footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.8rem;
            color: #525252;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">EasyFit</div>
        <p class="tagline">Simple and effective fitness apps for everyone.</p>

        <div class="apps">
            <div class="app-card">
                <span class="badge">Coming Soon</span>
                <h3>Tabata HIIT Interval Timer</h3>
                <p>High-intensity interval sessions with iPhone, Apple Watch, widgets, and health integrations.</p>
            </div>
        </div>

        <div class="links">
            <a href="/privacy.html">Privacy Notice</a>
            <a href="/terms.html">Terms of Use</a>
            <a href="/support.html">Support</a>
        </div>
    </div>

    <footer>&copy; 2026 EasyFit</footer>
</body>
</html>
