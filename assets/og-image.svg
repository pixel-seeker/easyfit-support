<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
    <title id="title">Interval Timer Tabata and HIIT by EasyFit</title>
    <desc id="desc">Social preview image for the EasyFit interval timer app.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#fff7f3"/>
            <stop offset="1" stop-color="#ffe4d9"/>
        </linearGradient>
        <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ff7a31"/>
            <stop offset="1" stop-color="#ff454f"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#141414" flood-opacity="0.18"/>
        </filter>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)"/>
    <circle cx="1060" cy="70" r="210" fill="#1769ff" opacity="0.12"/>
    <circle cx="130" cy="560" r="260" fill="#ff7a31" opacity="0.14"/>
    <g transform="translate(82 82)">
        <rect width="132" height="132" rx="30" fill="url(#hot)" filter="url(#shadow)"/>
        <text x="66" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="900" fill="#ffffff">HI</text>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" fill="#141414">
        <text x="82" y="285" font-size="76" font-weight="900" letter-spacing="0">Interval Timer</text>
        <text x="82" y="370" font-size="76" font-weight="900" letter-spacing="0">Tabata and HIIT</text>
        <text x="86" y="438" font-size="30" font-weight="650" fill="#68646a">Custom rounds, Apple Watch heart rate, haptics, music, and progress.</text>
        <text x="86" y="514" font-size="28" font-weight="800" fill="#ff454f">EasyFit for iPhone and Apple Watch</text>
    </g>
    <g transform="translate(835 104)" filter="url(#shadow)">
        <rect width="250" height="430" rx="48" fill="#111111"/>
        <rect x="12" y="12" width="226" height="406" rx="36" fill="#f8f8fb"/>
        <text x="42" y="82" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="900" fill="#141414">Bodyweight</text>
        <text x="42" y="113" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="900" fill="#141414">Intervals</text>
        <rect x="42" y="145" width="166" height="58" rx="20" fill="url(#hot)"/>
        <text x="125" y="183" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="900" fill="#ffffff">Start</text>
        <rect x="42" y="230" width="166" height="34" rx="12" fill="#ffffff"/>
        <rect x="42" y="276" width="166" height="34" rx="12" fill="#ffffff"/>
        <rect x="42" y="322" width="166" height="34" rx="12" fill="#ffffff"/>
    </g>
</svg>
